<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Music App</title>
<link rel="stylesheet" href="style/main.css">
</head>

<body>

  <header class="header">
    <div class="app-title">🎵 My Music App</div>
    <button id="loginBtn">OneDrive にログイン</button>
    <button id="chooseFolderBtn" disabled>フォルダを選ぶ</button>
  </header>

  <!-- フォルダ選択画面 -->
  <div id="folderList"></div>

  <!-- ダウンロード済みリスト -->
  <h2>再生リスト</h2>
  <div id="trackList"></div>

<!-- ==========================
     下部固定ミニプレイヤー
========================== -->
<div id="mini-player">
  <div class="mini-row">
    <img id="mini-cover" class="mini-cover" src="assets/images/music-note.png">

    <div class="mini-info">
      <span id="mini-title" class="mini-title">再生中なし</span>
      <span id="mini-artist" class="mini-artist"></span>
    </div>

    <div class="mini-controls">
      <button id="mini-playbtn" class="mini-playbtn">▶</button>
      <button id="mini-repeat-btn" class="mini-repeat-btn">🔁</button>
    </div>
  </div>

  <div class="mini-progress">
    <span id="mini-current">0:00</span>
    <input id="mini-slider" class="mini-slider" type="range" min="0" max="100" value="0">
    <span id="mini-duration">0:00</span>
  </div>
</div>

<script src="https://alcdn.msauth.net/browser/2.32.2/js/msal-browser.min.js"></script>
<script type="module" src="js/music-app.js"></script>

</body>
</html>
