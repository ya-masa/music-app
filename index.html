<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>music-app</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="manifest" href="manifest.json">
  </head>
  <body>
    <header class="header">
      <h1 class="app-title">Music App</h1>
    </header>

    <main class="home">
      <button onclick="login()">OneDrive にログイン</button>
      <section class="card-section">
        <h2 class="section-title">プレイリスト</h2>
        <div class="card-row">
          <div class="card">
            <img src="assets/icons/music-note.png" class="card-icon">
            <div class="card-title">曲名サンプル</div>
          </div>
          <div class="card">
            <img src="assets/icons/music-note.png" class="card-icon">
            <div class="card-title">曲名サンプル</div>
          </div>
          <div class="card">
            <img src="assets/icons/music-note.png" class="card-icon">
            <div class="card-title">曲名サンプル</div>
          </div>
        </div>
      </section>
      <section class="card-section">
        <h2 class="section-title">最近再生した曲</h2>
        <div class="card-row">
          <div class="card">
            <img src="assets/icons/music-note.png" class="card-icon">
            <div class="card-title">最近の曲1</div>
          </div>
          <div class="card">
            <img src="assets/icons/music-note.png" class="card-icon">
            <div class="card-title">最近の曲2</div>
          </div>
        </div>
      </section>
    </main>
    <section id="now-playing" class="screen">

      <!-- ジャケット画像 -->
      <div>
        <img src="assets/icons/music-note.png" alt="cover" class="np-cover">
      </div>

      <!-- 曲名・アーティスト -->
      <div class="np-info">
        <h2 class="np-title">曲名</h2>
        <p class="np-artist">アーティスト名</p>
      </div>

      <!-- シークバー -->
      <div class="np-progress">
        <span class="np-time">0:00</span>
        <input type="range" min="0" max="100" value="0" id="seekBar" class="np-slider">
        <span id="currentTime" class="np-duration">0:00</span><span>/</span>
        <span id="duration" class="np-duration">4:32</span>
      </div>

      <!-- コントロールボタン -->
      <div class="np-controls">
        <button class="np-prev">⏮</button>
        <button id="playBtn">▶</button>
        <button class="np-next">⏭</button>
      </div>

      <div id="songList" class="song-list"></div>

    </section>
    
    <section id="mini-player" class="screen">
      <!-- シークバー -->
      <div class="mini-progress">
        <span class="np-time">0:00</span>
        <input type="range" min="0" max="100" value="0" id="mini-seekBar" class="mini-slider">
        <span id="mini-currentTime" class="np-duration">0:00</span><span>/</span>
        <span id="mini-duration" class="np-duration">4:32</span>
      </div>
      <div class="mini-row">
        <!-- ジャケット画像 -->
        <div>
          <img src="assets/icons/music-note.png" alt="cover" class="mini-cover">
        </div>
        <!-- 曲名・アーティスト -->
        <div class="mini-info">
          <span class="mini-title">曲名</span><span>/</span>
          <span class="mini-artist">アーティスト名</span>
        </div>
        <!-- コントロールボタン -->
        <div class="mini-controls">
          <button id="mini-playBtn" class="mini-playbtn">▶</button>
          <button id="repeatBtn" class="mini-repeat-btn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-5">
              <path fill-rule="evenodd" d="M15.312 11.424a5.5 5.5 0 0 1-9.201 2.466l-.312-.311h2.433a.75.75 0 0 0 0-1.5H3.989a.75.75 0 0 0-.75.75v4.242a.75.75 0 0 0 1.5 0v-2.43l.31.31a7 7 0 0 0 11.712-3.138.75.75 0 0 0-1.449-.39Zm1.23-3.723a.75.75 0 0 0 .219-.53V2.929a.75.75 0 0 0-1.5 0V5.36l-.31-.31A7 7 0 0 0 3.239 8.188a.75.75 0 1 0 1.448.389A5.5 5.5 0 0 1 13.89 6.11l.311.31h-2.432a.75.75 0 0 0 0 1.5h4.243a.75.75 0 0 0 .53-.219Z" clip-rule="evenodd" />
            </svg>
          </button>
          <button class="np-next" class="mini-next-btn">⏭</button>
        </div>
      </div>
    </section> 
    <script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
fetch("https://graph.microsoft.com/v1.0/me/drive/root:/music:/children", {
  headers: {
    Authorization: `Bearer ${accessToken}`
  }
})
  .then(res => res.json())
  .then(data => {
    console.log(data.value); // ← 曲の一覧
  });
</script>
<style>
