<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>music-app</title>
    <link rel="stylesheet" href="/music-app/style/main.css">
    <link rel="manifest" href="manifest.json">
  </head>

  <body>
    <header class="header">
      <h1 class="app-title">Music App</h1>
    </header>

    <main class="home">
      <!-- ==========================
          メインプレイヤー
      =========================== -->      
      <section id="now-playing">
        <audio id="audioPlayer" controls></audio>
        <img class="np-cover" src="assets/images/music-note.png">
        <div class="np-info">
          <div class="np-title">曲名</div>
          <div class="np-artist">アーティスト名</div>
        </div>
        <div class="np-progress">
          <span id="np-currentTime" class="np-duration">0:00</span>
          <input type="range" min="0" max="100" value="0" id="np-seekBar" class="np-slider">
          <span id="np-duration" class="np-duration">0:00</span>

          <button id="playBtn" class="playbtn">▶</button>

          <button id="repeatBtn" class="repeat-btn">🔁</button>

          <button id="nextBtn" class="next-btn">⏭</button>
        </div>
      </section>

      <h2>📥 オフライン保存済み</h2>
      <div id="offlineList" class="song-list"></div>

      <h2>☁ OneDrive の曲</h2><button onclick="login()">OneDrive にログイン</button>
      <div id="cloudList" class="song-list"></div>

      <div id="loading" class="loading" style="display:none;">
        <div class="spinner"></div>
        <p>読み込み中…</p>
      </div>

    </main>


    <!-- ==========================
         ミニプレイヤー（固定表示）
    =========================== -->
    <section id="mini-player" class="screen">
      <div class="mini-progress">
        <span id="mini-currentTime" class="mini-duration">0:00</span>
        <input type="range" min="0" max="100" value="0" id="mini-seekBar" class="mini-slider">
        <span id="mini-duration" class="mini-duration">0:00</span>
      </div>

      <div class="mini-row">
        <img src="assets/images/music-note.png" alt="cover" class="mini-cover">

        <div class="mini-info">
          <span class="mini-title">曲名</span>
          <span class="mini-artist">アーティスト名</span>
        </div>

        <div class="mini-controls">
          <button id="playBtnMini" class="playbtn">▶</button>

          <button id="repeatBtnMini" class="repeat-btn">🔁</button>

          <button id="nextBtnMini" class="next-btn">⏭</button>
        </div>
      </div>
    </section>

    <script src="https://alcdn.msauth.net/browser/2.32.0/js/msal-browser.min.js"></script>
    <script src="js/app.js" defer></script>

    <script>
      navigator.serviceWorker.register("/music-app/service-worker.js", {
        scope: "/music-app/"
      });
    </script>
  </body>
</html>
